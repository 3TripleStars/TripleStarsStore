<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja TripleStars</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .produto {
      background: white;
      width: 250px;
      margin: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .produto img {
      width: 100%;
      border-radius: 10px;
    }

    .preco {
      color: green;
      font-size: 18px;
      margin: 10px 0;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: darkgreen;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  🛒 Loja TripleStars
</header>

<div class="container">

  <div class="produto">
    <img src="https://via.placeholder.com/250" alt="Produto 1">
    <h3>Produto 1</h3>
    <p class="preco">R$ 49,90</p>
    <button onclick="alert('Você clicou para comprar o Produto 1')">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/250" alt="Produto 2">
    <h3>Produto 2</h3>
    <p class="preco">R$ 79,90</p>
    <button onclick="alert('Você clicou para comprar o Produto 2')">Comprar</button>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/250" alt="Produto 3">
    <h3>Produto 3</h3>
    <p class="preco">R$ 99,90</p>
    <button onclick="alert('Você clicou para comprar o Produto 3')">Comprar</button>
  </div>

</div>

<footer>
  © 2026 TripleStars - Todos os direitos reservados
</footer>

</body>
</html>
